# Manifold — release workflow.
#
# Triggers on tag push matching `v*` (e.g., `v0.1.0`). Runs the
# build-dmg.sh + release-github.sh scripts non-interactively per
# SPEC §16. The scripts ship under .gitignore as Brandon's local
# artifacts; the CI side either expects them to be checked-in or
# bootstrapped from a known template — see Phase 16 BUILD_LOG
# deviation #1 for the open question Brandon needs to resolve
# before this workflow runs successfully on a fresh CI checkout.
#
# Required GitHub Secrets:
#   - SPARKLE_PRIVATE_KEY: the EdDSA private key (the contents of
#     local `keyfile.txt`). build-dmg.sh's sign_update step pulls
#     from the user's keychain by default; for CI we materialize
#     the keychain entry from this secret at workflow-start.
#
# Required GitHub Actions permissions:
#   - contents: write — to push tags + create releases.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      CI: 'true'  # release-github.sh's --publish path skips the
                  # human prompt when CI=true (per SPEC §16).
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for the release-notes
                          # diffstat against the previous tag.

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies -project Manifold.xcodeproj

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Materialize Sparkle private key into keychain
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not set; see Phase 16 BUILD_LOG."
            exit 1
          fi
          # Sparkle's sign_update reads the EdDSA private key from
          # an account named 'manifold' in the user's keychain
          # (matches build-dmg.sh's SPARKLE_KEYCHAIN_ACCOUNT). Add
          # it via `security add-generic-password`.
          security add-generic-password \
            -a manifold \
            -s 'https://sparkle-project.org' \
            -w "$SPARKLE_PRIVATE_KEY" || true
          # Also write it back to keyfile.txt for build-dmg.sh's
          # `keyfile.txt` consistency check.
          printf '%s' "$SPARKLE_PRIVATE_KEY" > keyfile.txt

      - name: Run build-dmg.sh
        run: |
          if [[ ! -x ./build-dmg.sh ]]; then
            echo "::error::build-dmg.sh not present in repo root. Per Phase 16 BUILD_LOG, the script is currently gitignored — Brandon needs to either commit it or have CI bootstrap it from a template before this workflow can succeed."
            exit 1
          fi
          ./build-dmg.sh

      - name: Run release-github.sh (phase 1 — generate notes draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! -x ./release-github.sh ]]; then
            echo "::error::release-github.sh not present in repo root. See note above."
            exit 1
          fi
          ./release-github.sh
          # release-github.sh phase-1 writes .release-notes-draft.md.
          # CI promotes it to RELEASE_NOTES.md unmodified — humans
          # do the editorial pass before pushing the tag, not after.
          if [[ -f .release-notes-draft.md ]]; then
            mv .release-notes-draft.md RELEASE_NOTES.md
          fi

      - name: Run release-github.sh --publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./release-github.sh --publish

      - name: Commit appcast.xml update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # release-github.sh --publish updates appcast.xml in place;
          # commit the change back to main so Sparkle clients see
          # the new version on their next check.
          if ! git diff --quiet appcast.xml; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add appcast.xml
            git commit -m "chore: appcast.xml update for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi
