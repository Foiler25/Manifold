# SwiftLint configuration for Manifold.
# Starter ruleset — Apple Swift defaults plus a few project-specific tweaks
# called out in builder.md (no force unwraps in production, no magic numbers,
# no hardcoded strings in views, etc.). Reviewer can tighten over time.

included:
  - Manifold
  - ManifoldKit/Sources
  - ManifoldKitTests
  - ManifoldWidget

excluded:
  - .build
  - DerivedData
  - build
  - Manifold.xcodeproj

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - todo            # We use TODO/FIXME comments deliberately during phased build.
  - line_length     # Enforced by review, not by linter; comments and SPEC quotes
                    # legitimately push past 120.

line_length:
  warning: 140
  error: 200

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - vid
    - pid

# Test files frequently use long, descriptive function names.
function_body_length:
  warning: 80
  error: 200

type_body_length:
  warning: 350
  error: 500

file_length:
  warning: 500
  error: 800

# Force_cast in tests is acceptable when the cast is part of the test premise.
force_cast: warning
force_try: warning
